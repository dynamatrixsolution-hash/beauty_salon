<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBC695"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C5A028"/>
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCDAE1"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#EBC695" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle simulating a clean elegant crest -->
  <circle cx="100" cy="100" r="95" fill="#fdfcfb" stroke="url(#goldGradient)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" stroke-dasharray="2 3"/>
  
  <!-- Stylized Lotus/Leaf elements representing nature, beauty, and grace -->
  <path d="M100 25 C 60 70, 30 100, 65 145 C 85 165, 100 170, 100 170 C 100 170, 115 165, 135 145 C 170 100, 140 70, 100 25 Z" fill="url(#pinkGradient)" opacity="0.25"/>
  <path d="M100 40 C 75 80, 50 105, 75 135 C 90 150, 100 155, 100 155 C 100 155, 110 150, 125 135 C 150 105, 125 80, 100 40 Z" fill="none" stroke="url(#goldGradient)" stroke-width="1.5"/>
  <path d="M100 55 C 85 85, 70 105, 85 125 C 95 135, 100 140, 100 140 C 100 140, 105 135, 115 125 C 130 105, 115 85, 100 55 Z" fill="#ffffff" opacity="0.6"/>
  <path d="M100 155 L 100 40" stroke="url(#goldGradient)" stroke-width="1" stroke-dasharray="3 3"/>
  
  <!-- Typography / Monogram -->
  <text x="100" y="112" font-family="'Cormorant Garamond', 'Playfair Display', serif" font-size="46" font-weight="600" fill="#2d2a26" text-anchor="middle" filter="url(#shadow)">G<tspan font-size="32" fill="#D4AF37">&amp;</tspan>G</text>
  
  <!-- Subtext -->
  <text x="100" y="142" font-family="'Poppins', 'Montserrat', sans-serif" font-size="9.5" font-weight="600" letter-spacing="4" fill="#4a4641" text-anchor="middle">GLOW &amp; GRACE</text>
  <text x="100" y="155" font-family="'Poppins', 'Montserrat', sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#8c857b" text-anchor="middle">STUDIO</text>
  
  <!-- Delicate sparkles -->
  <path d="M 65 60 L 67 65 L 72 67 L 67 69 L 65 74 L 63 69 L 58 67 L 63 65 Z" fill="#D4AF37" opacity="0.6"/>
  <path d="M 135 75 L 136 78 L 139 79 L 136 80 L 135 83 L 134 80 L 131 79 L 134 78 Z" fill="#D4AF37" opacity="0.6"/>
</svg>